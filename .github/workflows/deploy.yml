on:
  push:
    branches: ["main"]

jobs:

  test:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      run: pytest

  docker:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/streamlit-rag:latest .
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/streamlit-rag:latest \
                   ${{ secrets.DOCKERHUB_USERNAME }}/streamlit-rag:${{ github.sha }}

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/streamlit-rag:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/streamlit-rag:${{ github.sha }}
